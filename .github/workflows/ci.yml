name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Lint
        run: go tool golangci-lint run ./...

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Test with coverage
        env:
          COVERAGE_THRESHOLD: "90"
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1
          total=$(go tool cover -func=coverage.out | awk 'END { gsub(/%/, "", $NF); print $NF }')
          awk -v total="$total" -v min="$COVERAGE_THRESHOLD" 'BEGIN {
            printf "total coverage: %s%% (minimum: %s%%)\n", total, min
            if (total + 0 < min + 0) {
              printf "FAIL: coverage %s%% is below the %s%% threshold\n", total, min
              exit 1
            }
          }'

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore
