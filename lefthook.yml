pre-commit:
  parallel: true
  commands:
    fmt:
      priority: 1
      glob: "*.go"
      run: golangci-lint fmt
      stage_fixed: true
    vet:
      priority: 2
      glob: "*.go"
      run: go vet ./...
    lint:
      priority: 3
      glob: "*.go"
      run: golangci-lint run --fix
      stage_fixed: true

pre-push:
  commands:
    test:
      run: go test ./...
