pre-commit:
  parallel: true
  commands:
    fmt:
      priority: 1
      glob: "*.go"
      run: golangci-lint fmt
      stage_fixed: true
    vet:
      priority: 2
      glob: "*.go"
      run: go vet ./...
    lint:
      priority: 3
      glob: "*.go"
      run: golangci-lint run --fix
      stage_fixed: true

pre-push:
  commands:
    test:
      run: make test

# Manually runnable: `lefthook run test`
# Runs the unit tests with a coverage profile and prints total coverage.
test:
  commands:
    cover:
      run: make test-cover
