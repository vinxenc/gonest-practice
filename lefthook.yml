pre-commit:
  parallel: true
  commands:
    fmt:
      priority: 1
      glob: "*.go"
      run: go tool golangci-lint fmt
      stage_fixed: true
    vet:
      priority: 2
      glob: "*.go"
      run: go vet ./...
    lint:
      priority: 3
      glob: "*.go"
      run: go tool golangci-lint run --fix
      stage_fixed: true

pre-push:
  commands:
    test:
      run: go test ./...

# Manually runnable: `go tool lefthook run test`
# Runs the unit tests with a coverage profile and prints total coverage.
test:
  commands:
    cover:
      run: go test -coverprofile=coverage.out -covermode=atomic ./... && go tool cover -func=coverage.out | tail -1
