pre-commit:
  parallel: true
  commands:
    fmt:
      priority: 1
      glob: "*.go"
      run: go tool golangci-lint fmt
      stage_fixed: true
    vet:
      priority: 2
      glob: "*.go"
      run: go vet ./...
    lint:
      priority: 3
      glob: "*.go"
      run: go tool golangci-lint run --fix
      stage_fixed: true

pre-push:
  commands:
    test:
      run: go test ./...

# Manually runnable: `go tool lefthook run test`
# Runs the unit tests and checks the coverage threshold the same way CI does
# (github.com/vladopajic/go-test-coverage, configured by .testcoverage.yml).
test:
  commands:
    cover:
      run: go test ./... -coverprofile=cover.out -covermode=atomic && go run github.com/vladopajic/go-test-coverage/v2@v2.18.8 --config=.testcoverage.yml
